# Add to configuration.yaml (or split into a packages file), alongside
# rest_commands.yaml and automation.yaml.
#
# homebox_highlight_color picks the highlight/breathe color. Names here
# must exactly match the keys of `color_map` in automation.yaml — add an
# entry to both to offer another color.
#
# homebox_activity_counter is bumped by 1 on every real webhook call (see
# automation.yaml) — its idle_check trigger fires every minute and
# measures elapsed time against this counter's last_changed timestamp.
# The number itself is meaningless, it's just a reliable, always-distinct
# value to watch.
#
# homebox_idle_breathe_delay / homebox_idle_power_off_delay set how long the
# strip has to sit idle before, respectively, the breathe effect starts and
# the device powers off. off_delay should stay greater than breathe_delay —
# if it isn't, the breathe stage is simply skipped and it goes straight to off.
# off_delay ALSO controls the ESP32 display's backlight now (see
# automation.yaml's off_delay branch) — deliberately reused rather than
# adding a separate delay, since "WLED idle long enough to power off"
# and "nobody's looking at the display either" are the same moment.
#
# homebox_breathe_effect_speed tunes the idle Breathe effect's speed
# (WLED's sx segment param, 0-255) — applied uniformly to every unit's
# Y-axis and X-axis segments (see wled_start_breathe in rest_commands.yaml).
#
# homebox_breathe_started_internal / homebox_powered_off_internal are internal bookkeeping,
# not meant to be touched from the UI — automation.yaml resets them on
# every real webhook call so each idle stage fires exactly once per idle
# period instead of repeating every minute.
#
# homebox_display_timeout_minutes sets how long the ESP32 display can sit
# on the same item/location, unacknowledged, before display_automation.yaml
# auto-clears it back to the idle logo — see its display_idle_check
# trigger. Reuses homebox_activity_counter as the idle signal (bumped by
# both real navigations and acknowledges, see display_ack_automation.yaml).
# 0 disables the timeout entirely.
#
# homebox_display_timed_out_internal is internal bookkeeping, same pattern
# as homebox_breathe_started_internal — not meant to be touched from the
# UI, reset on every real navigation and every acknowledge so the timeout
# fires exactly once per idle period.
#
# All of these persist their value across Home Assistant restarts
# automatically (input_number/input_select/input_boolean all implement
# RestoreEntity) — `initial:` only applies the very first time a helper
# is created.

input_select:
  homebox_highlight_color:
    name: Homebox Highlight Color
    icon: mdi:palette
    options:
      - Red
      - Orange
      - Yellow
      - Green
      - Blue
      - Purple
      - White
      - Cyan
    initial: Red

input_number:
  homebox_activity_counter:
    name: Homebox Activity Counter
    icon: mdi:counter
    min: 0
    max: 999999999
    step: 1
    mode: box

  homebox_idle_breathe_delay:
    name: Homebox Idle Breathe Delay (minutes)
    icon: mdi:timer-outline
    min: 1
    max: 120
    step: 1
    initial: 5
    mode: box

  homebox_idle_power_off_delay:
    name: Homebox Idle Power-Off Delay (minutes)
    icon: mdi:timer-off-outline
    min: 1
    max: 240
    step: 1
    initial: 30
    mode: box

  homebox_breathe_effect_speed:
    name: Homebox Breathe Effect Speed
    icon: mdi:speedometer
    min: 0
    max: 255
    step: 1
    initial: 128
    mode: slider

  homebox_display_timeout_minutes:
    name: Homebox Display Timeout (minutes)
    icon: mdi:timer-alert-outline
    min: 0
    max: 240
    step: 1
    initial: 0
    mode: box

input_boolean:
  homebox_breathe_started_internal:
    name: Homebox Breathe Started (internal)
    icon: mdi:sync

  homebox_powered_off_internal:
    name: Homebox Powered Off (internal)
    icon: mdi:power-off

  homebox_display_timed_out_internal:
    name: Homebox Display Timed Out (internal)
    icon: mdi:timer-off-outline
