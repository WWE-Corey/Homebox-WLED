; PlatformIO project file for the Location Display firmware.
;
; Targets a Hosyond ESP32-S3 N16R8 dev board (genuine ESP32-S3-WROOM-1
; module, 16MB flash / 8MB octal PSRAM) — confirmed, not a guess,
; matching the actual hardware this project is being built against.
; `board = esp32-s3-devkitc-1` is used because Hosyond's board (like
; most generic N16R8 dev boards) follows Espressif's own DevKitC-1
; pinout/layout; there's no PlatformIO board ID specific to the Hosyond
; brand itself. Its stock definition assumes an 8MB-flash/no-PSRAM
; variant ("Espressif ESP32-S3-DevKitC-1-N8" — see
; ~/.platformio/platforms/espressif32/boards/esp32-s3-devkitc-1.json),
; so several of its defaults need overriding below for our actual N16R8
; — this was the actual cause of an early boot-loop (watchdog reset,
; zero serial output) on first flash: the PSRAM mode flags alone
; weren't the problem, the stock 8MB flash_size/partition table was.
;
; [env] settings apply to every environment below unless overridden, so
; the two environments ([env:esp32-s3] for the real firmware,
; [env:bringup] for src/blink_test.cpp — see its header comment) can't
; drift out of sync on the board-level settings the way flash_size did
; here.

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; qio_opi (QIO flash + octal PSRAM) is what's usually cited as correct
; for N16R8 boards, and looked right on paper, but caused a boot loop in
; practice (watchdog reset before any bootloader output at all) — a
; documented real symptom on this exact board class, not unique to us
; (see the README's Open Items for the "qio_opi boot loop" writeup).
; dio_opi (DIO flash + octal PSRAM) is what's actually running here
; instead — confirmed against real hardware: the ROM boot log always
; reports "mode:DIO" regardless of what's set here, and psramFound()/
; ESP.getPsramSize() both confirm the full 8MB PSRAM genuinely works
; with this setting.
board_build.arduino.memory_type = dio_opi
board_build.flash_mode = dio
board_build.psram_type = opi

; The stock board profile hardcodes 8MB (flash_size/maximum_size/
; partitions all assume an N8 board) — overridden here for our actual
; 16MB flash.
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

; IMPORTANT — confirmed against real hardware, not just datasheet
; reading: GPIO 26-37 is entirely unusable for anything else (SPI,
; buttons, etc.) on this chip:
;   - GPIO 33-37: permanently wired to octal PSRAM on this N16R8 board.
;   - GPIO 26-32: wired to the flash SPI bus on every ESP32-S3-WROOM-1
;     module (not just PSRAM variants). pinMode(32, INPUT_PULLUP) alone
;     was enough to boot-loop (TG1WDT_SYS_RST) on the bench — this is
;     what actually caused the extended boot-loop debugging session,
;     not the PSRAM/flash-size config changes tried first.
; Separately, GPIO 22-25 don't exist on the ESP32-S3 chip at all
; (unlike the original ESP32, which has them) — pinMode() on one of
; those logs "Invalid pin selected" and silently no-ops rather than
; crashing. See the pin assignments in src/homebox_display.ino, which
; were moved off GPIO 32/27/25 for these reasons and bench-verified
; clean on GPIO 4/6/7 instead.

[env:esp32-s3]
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -D BOARD_HAS_PSRAM
    ; PlatformIO adds this project's include/ dir (where lv_conf.h
    ; lives) to the main .ino source's compile command automatically,
    ; but NOT to library sources compiled via lib_deps (lvgl included) —
    ; confirmed via a verbose build: homebox_display.ino.cpp.o gets
    ; -Iinclude, lv_nv3007.c.o doesn't. Without this, lv_nv3007.c is
    ; compiled with LV_CONF_INCLUDE_SIMPLE defined but can't actually
    ; find lv_conf.h, silently falls back to LV_USE_NV3007's default of
    ; 0, and produces an empty object file — the .ino compiles fine
    ; (it does see lv_conf.h) but linking fails with "undefined
    ; reference to lv_nv3007_create". Adding -I explicitly here applies
    ; it to every compilation unit, library sources included.
    -I include
    ; Same class of problem as the -Iinclude fix above, different
    ; symptom: a #define in homebox_display.ino ONLY affects that one
    ; translation unit's preprocessing — it can never reach WebServer's
    ; own Parsing.cpp, a separately-compiled library source, regardless
    ; of #include order in the .ino (bench-confirmed: a local #define
    ; before #include <WebServer.h> had zero effect). These two ARE both
    ; #ifndef-guarded in WebServer.h specifically so they can be
    ; overridden — but only via a build-wide -D, which every
    ; compilation unit sees, including Parsing.cpp's own #include of the
    ; same header. Root cause of a bench-observed ~5s stall on EVERY
    ; /image POST: the default 1436-byte HTTP_RAW_BUFLEN doesn't evenly
    ; divide this display's 40328-byte payload, so the raw-body read
    ; loop's LAST chunk always asks Stream::readBytes() for more bytes
    ; than the client will ever send, and readBytes() blocks retrying
    ; until its internal timeout fires before giving up and returning
    ; what it actually got. Set equal to the full payload size
    ; (IMAGE_AREA_WIDTH*DISPLAY_HEIGHT*2, see homebox_display.ino) so
    ; the whole image always arrives in exactly one read, which can
    ; never ask for more than what's coming — see the static_assert
    ; right after IMAGE_AREA_WIDTH/DISPLAY_HEIGHT are defined in the
    ; .ino, which fails the build loudly if these two ever drift out of
    ; sync with the real payload size again. HTTP_UPLOAD_BUFLEN sizes
    ; the actual fixed-size receive buffer (HTTPRaw::buf) — MUST be
    ; raised to at least HTTP_RAW_BUFLEN's value alongside it, or
    ; readBytes() writes past the end of that buffer.
    -D HTTP_RAW_BUFLEN=40328
    -D HTTP_UPLOAD_BUFLEN=40328

lib_deps =
    lvgl/lvgl
    bblanchon/ArduinoJson

; Excludes blink_test.cpp, which has its own setup()/loop() for
; [env:bringup] below — without this, building THIS environment would
; try to compile both files and fail to link with duplicate
; setup()/loop() definitions.
build_src_filter = +<*> -<blink_test.cpp>

; Minimal board bring-up test — see the comment at the top of
; src/blink_test.cpp for what it checks and why it's a separate
; environment (board/PSRAM/button wiring only, independent of the real
; firmware and its LVGL/display setup). Run with:
;   pio run -e bringup -t upload -t monitor
[env:bringup]
build_flags =
    -D BOARD_HAS_PSRAM
; Opposite filter from [env:esp32-s3] above — only blink_test.cpp, none
; of the real firmware (which won't compile without a real lv_conf.h
; anyway).
build_src_filter = -<*> +<blink_test.cpp>
