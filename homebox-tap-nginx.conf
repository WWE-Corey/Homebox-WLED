# nginx config for the "homebox tap" — a separate, small LXC/VM running
# nginx in front of Homebox, replacing the Tampermonkey userscript
# (homebox-wled.user.js, now legacy) as the "what is the user looking at"
# signal for automation.yaml.
#
# Why a separate box rather than installing nginx into the Homebox LXC
# itself: Homebox's own update script only touches /opt/homebox and the
# homebox.service unit, so co-locating would technically be safe — but a
# separate box keeps the Homebox LXC exactly what its install script
# expects (clean re-runs, matches upstream assumptions), and lets this
# nginx tap be rebooted/rebuilt/snapshotted independently.
#
# How it works: Homebox's own frontend (a SPA) issues a GET
# /api/v1/entities/{id} whenever you open an item OR location's detail
# page — that's Homebox's own "fetch this record to render it" call, not
# a purpose-built "view" event (Homebox's API has no such event; see the
# README's "Why this exists" section). Point your browser/reverse proxy
# at THIS nginx instance instead of Homebox directly, and it
# transparently proxies everything through unchanged while also
# mirroring just that one GET pattern to Home Assistant's
# homebox-highlight webhook — the same webhook automation.yaml already
# listens on. Non-GET requests (creates/edits/deletes) are proxied
# straight through, never mirrored.
#
# CONFIRMED against a real Homebox instance's DevTools Network tab (as of
# Homebox v0.26+, which merged items and locations into a single
# /api/v1/entities/{id} endpoint — repo.EntityOut in Homebox's OpenAPI
# spec): viewing BOTH an item page and a location page issue the exact
# same GET /api/v1/entities/{id} shape. There's no way to tell from the
# URL alone which kind of record it is — that's why this mirror sends
# only ?id=<uuid>, no type. automation.yaml determines item-vs-location
# itself, from the fetched entity's own entityType.isLocation field (see
# its comment for why). An earlier version of this file guessed at
# separate /api/v1/items/{id} and /api/v1/locations/{id} routes by
# symmetry — that guess was wrong for locations (confirmed via a live
# 404) and has been replaced by this single block.
#
# Replace the placeholder IPs below with your actual Homebox backend and
# Home Assistant addresses, then:
#   sudo ln -s /etc/nginx/sites-available/homebox-tap /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
# and point whatever you use to reach Homebox (browser bookmark, reverse
# proxy upstream, etc.) at this box instead of the Homebox LXC directly.

upstream homebox_backend {
    server 192.168.xx.xx:7745;
}

server {
    listen 80;

    location ~ ^/api/v1/entities/(?<entity_id>[a-f0-9-]+)$ {
        if ($request_method != GET) {
            proxy_pass http://homebox_backend;
            break;
        }

        mirror /mirror_entity_view;
        mirror_request_body off;
        proxy_pass http://homebox_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Hits the same webhook_id (homebox-highlight) that automation.yaml
    # already triggers on — id= is the only thing this mirror can supply
    # (see the header comment above for why there's no type= anymore).
    location = /mirror_entity_view {
        internal;
        proxy_pass http://192.168.xx.xx:8123/api/webhook/homebox-highlight?id=$entity_id;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Content-Type "";
    }

    location / {
        proxy_pass http://homebox_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
